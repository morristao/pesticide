<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pest & Disease Detector</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="panel">
        <header>
          <h1>Pest &amp; Disease Detector</h1>
          <p>Upload field images, select a model, and review automated assessments.</p>
        </header>
        <form id="inference-form">
          <label for="model-select">Choose model</label>
          <select id="model-select" name="model_id" required></select>

          <label for="image-input">Upload image</label>
          <input id="image-input" name="image" type="file" accept="image/*" required />

          <button type="submit">Run inference</button>
        </form>
        <div id="status" role="status"></div>
      </section>
      <section class="panel" id="results">
        <h2>Result</h2>
        <pre id="result-json">Awaiting prediction...</pre>
      </section>
    </main>
    <script type="module" src="/static/app.js"></script>
  </body>
</html>
